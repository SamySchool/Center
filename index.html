<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SamySchool — نظام إدارة السنتر</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;900&family=Tajawal:wght@400;500;700;900&display=swap');

:root{
  --red:#FF0000; --red-dark:#c40000; --cream:#faf6f1; --ink:#221e1c;
  --charcoal:#1a1512; --muted:#8a7f78; --white:#ffffff; --border:#e9e0d6;
  --green:#1a8a4a; --green-bg:#e7f6ec; --amber:#c07a00; --amber-bg:#fbf1de;
  --rose:#d1332f; --rose-bg:#fbe9e8; --card-radius:14px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Tajawal',sans-serif; background:var(--cream); color:var(--ink);
  direction:rtl;
}
#root{min-height:100vh;}
.app{display:flex; min-height:100vh;}
.sidebar{
  width:230px; background:var(--charcoal); color:#fff; display:flex; flex-direction:column;
  flex-shrink:0; position:sticky; top:70px; height:calc(100vh - 70px); overflow-y:auto;
}
.brand{display:flex; align-items:center; gap:10px; padding:22px 18px 16px; border-bottom:1px solid #33291f;}
.brand-sub{font-size:11px; color:#c9beb3; margin-top:2px; letter-spacing:.3px;}
.nav{padding:10px; display:flex; flex-direction:column; gap:4px; flex:1;}
.nav button{
  all:unset; cursor:pointer; padding:11px 14px; border-radius:10px; font-size:14.5px; font-weight:700;
  color:#e6ddd3; display:flex; align-items:center; gap:10px; transition:background .15s, color .15s;
}
.nav button:hover{background:#2a221c;}
.nav button.active{background:var(--red); color:#fff;}
.nav-icon{font-size:16px; width:20px; text-align:center;}
.sidebar-foot{padding:14px; border-top:1px solid #33291f; font-size:11px; color:#9b8f85;}
.main{flex:1; min-width:0; padding:26px 30px 60px;}
.topbar{display:flex; align-items:center; justify-content:space-between; margin-bottom:22px; flex-wrap:wrap; gap:12px;}
.topbar h1{font-size:22px; margin:0;}
.topbar .date{color:var(--muted); font-size:13px; margin-top:2px;}
.btn{
  border:none; border-radius:10px; padding:10px 16px; font-weight:800; font-size:13.5px; cursor:pointer;
  font-family:inherit; display:inline-flex; align-items:center; gap:6px; transition:transform .1s, opacity .1s;
}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--red); color:#fff;}
.btn-primary:hover{background:var(--red-dark);}
.btn-ghost{background:#fff; color:var(--ink); border:1.5px solid var(--border);}
.btn-ghost:hover{background:#f4efe8;}
.btn-sm{padding:6px 10px; font-size:12px; border-radius:8px;}
.btn-danger{background:var(--rose-bg); color:var(--rose);}
.card{background:#fff; border:1px solid var(--border); border-radius:var(--card-radius); padding:18px;}
.grid{display:grid; gap:16px;}
.grid-4{grid-template-columns:repeat(4,1fr);}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-2{grid-template-columns:repeat(2,1fr);}
@media(max-width:1000px){.grid-4{grid-template-columns:repeat(2,1fr);} .grid-3{grid-template-columns:repeat(2,1fr);}}
@media(max-width:640px){.grid-4,.grid-3,.grid-2{grid-template-columns:1fr;} .app{flex-direction:column;} .sidebar{width:100%; height:auto; position:relative; flex-direction:row; overflow-x:auto;} .nav{flex-direction:row;} .main{padding:16px;}}
.stat-label{font-size:12.5px; color:var(--muted); font-weight:700;}
.stat-value{font-size:26px; font-weight:900; margin-top:6px;}
.stat-icon{font-size:20px; opacity:.7;}
.section-title{font-size:16px; font-weight:900; margin:0 0 14px;}
table{width:100%; border-collapse:collapse; font-size:13.5px;}
th{text-align:right; color:var(--muted); font-weight:700; padding:9px 10px; border-bottom:2px solid var(--border); font-size:12.5px;}
td{padding:10px; border-bottom:1px solid var(--border); vertical-align:middle;}
tr:last-child td{border-bottom:none;}
.badge{display:inline-block; padding:3px 10px; border-radius:20px; font-size:11.5px; font-weight:800;}
.badge-green{background:var(--green-bg); color:var(--green);}
.badge-amber{background:var(--amber-bg); color:var(--amber);}
.badge-rose{background:var(--rose-bg); color:var(--rose);}
.badge-gray{background:#f0ebe4; color:var(--muted);}
input,select,textarea{
  font-family:inherit; border:1.5px solid var(--border); border-radius:9px; padding:9px 11px; font-size:13.5px;
  width:100%; background:#fff; color:var(--ink);
}
input:focus,select:focus,textarea:focus{outline:2px solid var(--red); outline-offset:1px; border-color:var(--red);}
label{font-size:12.5px; font-weight:700; color:var(--muted); display:block; margin-bottom:5px;}
.field{margin-bottom:12px;}
.toolbar{display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:16px;}
.search{max-width:260px;}
.modal-overlay{
  position:fixed; inset:0; background:rgba(20,15,10,.55); display:flex; align-items:center; justify-content:center;
  z-index:50; padding:16px;
}
.modal{background:#fff; border-radius:16px; padding:22px; width:100%; max-width:480px; max-height:88vh; overflow-y:auto;}
.modal h2{margin:0 0 16px; font-size:18px;}
.modal-actions{display:flex; gap:10px; justify-content:flex-start; margin-top:18px;}
.empty{text-align:center; padding:40px 20px; color:var(--muted);}
.empty-icon{font-size:34px; margin-bottom:10px;}
.chip-row{display:flex; gap:8px; flex-wrap:wrap;}
.chip{padding:7px 13px; border-radius:20px; border:1.5px solid var(--border); background:#fff; cursor:pointer; font-size:12.5px; font-weight:700; color:var(--ink);}
.chip.active{background:var(--red); border-color:var(--red); color:#fff;}
.att-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px;}
.att-item{border:1.5px solid var(--border); border-radius:10px; padding:10px; display:flex; align-items:center; justify-content:space-between; gap:6px;}
.att-item.present{border-color:var(--green); background:var(--green-bg);}
.att-item.absent{border-color:var(--rose); background:var(--rose-bg);}
.att-toggle{border:none; background:#fff; border-radius:7px; padding:5px 9px; font-size:11px; font-weight:800; cursor:pointer; border:1.5px solid var(--border);}
.avatar{width:34px; height:34px; border-radius:50%; background:var(--red); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:13px; flex-shrink:0;}
.student-row{display:flex; align-items:center; gap:10px;}
.link-btn{all:unset; cursor:pointer; color:var(--red); font-weight:800; font-size:13px;}
.muted{color:var(--muted);}
.small{font-size:12px;}
.tag-row{display:flex; gap:6px; flex-wrap:wrap;}
.print-only{display:none;}
.qr-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:14px;}
.qr-card{background:#fff; border:1.5px dashed var(--border); border-radius:12px; padding:14px; text-align:center; page-break-inside:avoid;}
.qr-box{display:flex; align-items:center; justify-content:center;}
.receipt-backdrop{position:fixed; inset:0; background:rgba(20,15,10,.55); display:flex; align-items:center; justify-content:center; z-index:60; padding:16px;}
.receipt-sheet{background:transparent;}
.receipt-print{background:#fff; width:280px; padding:18px; border-radius:10px; font-size:12.5px;}
.receipt-line{display:flex; justify-content:space-between; padding:4px 0; font-size:12.5px;}
.receipt-dashed{border-top:1.5px dashed #ccc; margin:8px 0;}
@media print{
  .sidebar,.topbar,.toolbar,.no-print,.app-header{display:none !important;}
  .main{padding:0;}
  .print-only{display:block;}
  body{background:#fff;}
  .receipt-print{width:72mm; margin:0 auto; box-shadow:none;}
  @page{size:80mm auto; margin:4mm;}
}
::-webkit-scrollbar{width:8px; height:8px;}
::-webkit-scrollbar-thumb{background:#d8cec2; border-radius:8px;}

/* ---- Schedule tab ("جدولي") ---- */
.sch-toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between;margin-bottom:16px;}
.sch-viewtoggle{display:inline-flex;background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:4px;gap:4px;}
.sch-viewtoggle button{all:unset;cursor:pointer;padding:8px 14px;border-radius:7px;font-size:12.5px;font-weight:800;color:var(--muted);}
.sch-viewtoggle button.active{background:var(--charcoal);color:#fff;}
.sch-grid-wrap{background:#fff;border:1px solid var(--border);border-radius:14px;overflow:auto;}
.sch-grid{display:grid;grid-template-columns:60px repeat(7,minmax(140px,1fr));min-width:880px;position:relative;}
.sch-corner{position:sticky;top:0;right:0;z-index:5;background:#fff;border-bottom:1px solid var(--border);border-left:1px solid var(--border);}
.sch-daylabel{position:sticky;top:0;z-index:3;background:#fff;border-bottom:1px solid var(--border);border-left:1px solid var(--border);padding:10px 6px;text-align:center;font-weight:900;font-size:13px;}
.sch-daylabel.off{color:var(--muted);}
.sch-hourlabel{position:sticky;right:0;z-index:2;background:#fff;border-left:1px solid var(--border);border-bottom:1px solid #f1ece5;font-size:10px;color:var(--muted);text-align:center;padding-top:2px;font-weight:800;height:48px;}
.sch-cell{border-left:1px solid var(--border);border-bottom:1px solid #f1ece5;height:48px;}
.sch-event{position:absolute;right:3px;left:3px;border-radius:8px;padding:4px 6px;font-size:10.5px;line-height:1.3;font-weight:800;color:#fff;overflow:hidden;cursor:pointer;box-shadow:0 3px 8px -3px rgba(0,0,0,.35);}
.sch-event .t1{font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sch-event .t2{font-weight:600;opacity:.9;font-size:9.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sch-event.school{background-image:repeating-linear-gradient(135deg,var(--charcoal),var(--charcoal) 7px,#2a221c 7px,#2a221c 14px);}
.sch-event.center{background:var(--red);}
.sch-event.online{background:var(--green);}
.sch-event.private{background:var(--amber);}
.sch-event.conflict{outline:2.5px solid var(--rose);outline-offset:1px;}
.sch-daily-list{display:flex;flex-direction:column;gap:10px;}
.sch-daily-card{display:flex;align-items:center;gap:12px;}
.sch-daily-card.conflict{border-color:var(--rose);background:var(--rose-bg);}
.sch-dot{width:9px;height:34px;border-radius:5px;flex-shrink:0;}
.sch-dot.school{background-image:repeating-linear-gradient(135deg,var(--charcoal),var(--charcoal) 4px,#2a221c 4px,#2a221c 8px);}
.sch-dot.center{background:var(--red);}
.sch-dot.online{background:var(--green);}
.sch-dot.private{background:var(--amber);}
.sch-slot-day h4{margin:0 0 8px;font-size:14px;font-weight:900;display:flex;align-items:center;gap:8px;}
.sch-slot-day.closed{opacity:.55;}
.sch-slot-row{display:flex;flex-wrap:wrap;gap:8px;}
.sch-slot-btn{border:1.5px solid var(--green);background:var(--green-bg);color:var(--green);border-radius:9px;padding:7px 13px;font-family:inherit;font-weight:800;font-size:12px;cursor:pointer;}
.sch-slot-btn.taken{border-color:var(--border);background:#f4efe8;color:var(--muted);cursor:not-allowed;text-decoration:line-through;}
.sch-widget-row{display:flex;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:12.5px;}
.sch-widget-row:last-child{border-bottom:none;}
.sch-owner-tag{margin-inline-start:auto;background:var(--charcoal);color:#fff;font-size:10px;font-weight:800;padding:2px 9px;border-radius:999px;white-space:nowrap;}

/* ---- Global app header (clock + center-group countdown, visible to admin & secretary) ---- */
.app-header{
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  background:var(--charcoal);color:#fff;padding:12px 26px;height:70px;box-sizing:border-box;
  position:sticky;top:0;z-index:40;box-shadow:0 2px 10px rgba(0,0,0,.15);
}
.app-header-side{flex:1;display:flex;min-width:0;}
.app-header-side:last-child{justify-content:flex-end;}
.app-header-clock{text-align:center;flex-shrink:0;}
.app-header-clock .ahc-time-big{font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:30px;letter-spacing:1px;line-height:1;}
.app-header-clock .ahc-date{font-size:11.5px;color:#c9beb3;margin-top:3px;font-weight:700;}
.app-header-countdown{background:rgba(255,255,255,.08);border-radius:10px;padding:7px 14px;display:flex;flex-direction:column;gap:2px;max-width:100%;}
.app-header-countdown.muted{color:#9b8f85;font-size:12px;font-weight:700;background:transparent;padding:7px 0;}
.app-header-countdown .ahc-label{font-size:11px;color:#c9beb3;font-weight:700;display:flex;align-items:center;gap:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.app-header-countdown .ahc-time{font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:19px;color:var(--red);}

/* ---- Local header inside "جدولي" tab (own clock color + countdown across all types) ---- */
.sch-header{
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:14px 22px;margin-bottom:16px;
}
.sch-header-side{flex:1;display:flex;min-width:0;}
.sch-header-side:last-child{justify-content:flex-end;}
.sch-header-clock{text-align:center;flex-shrink:0;}
.sch-header-clock .shc-time-big{font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:28px;color:var(--red);letter-spacing:1px;line-height:1;}
.sch-header-clock .shc-date{font-size:11.5px;color:var(--muted);margin-top:3px;font-weight:700;}
.sch-header-countdown{background:var(--rose-bg);border-radius:10px;padding:7px 14px;display:flex;flex-direction:column;gap:2px;max-width:100%;}
.sch-header-countdown.muted{color:var(--muted);font-size:12px;font-weight:700;background:transparent;padding:7px 0;}
.sch-header-countdown .shc-label{font-size:11px;color:var(--muted);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sch-header-countdown .shc-time{font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:19px;color:var(--rose);}
</style>
</head>
<body>
<div id="root"><div style="padding:60px 20px;text-align:center;color:#8a7f78;font-family:sans-serif;direction:rtl;">جارِ تحميل النظام... لو الشاشة فضلت كده أكتر من ثانيتين، يبقى فيه شبكة أو حاجب إعلانات بيمنع تحميل مكتبات البرنامج من الإنترنت.</div></div>
<script>
  window.addEventListener('error', function(e){
    var root = document.getElementById('root');
    if(root && !root.dataset.mounted){
      root.innerHTML = '<div style="font-family:sans-serif;direction:rtl;max-width:560px;margin:60px auto;padding:24px;background:#fff;border:1px solid #e9e0d6;border-radius:14px;">' +
        '<h2 style="color:#d1332f;margin-top:0;">تعذّر تحميل النظام</h2>' +
        '<p>الصفحة محتاجة اتصال بالإنترنت عشان تحمّل مكتبات React في أول مرة تفتح فيها الملف.</p>' +
        '<p style="color:#8a7f78;font-size:13px;">تفاصيل الخطأ: ' + (e.message || 'غير معروف') + '</p>' +
        '<p>تأكد إن جهازك متصل بالإنترنت وجرّب تعمل تحديث للصفحة (F5).</p></div>';
    }
  });
</script>

const studentFee = (student, group) => {
  const ov = student && student.feeOverride;
  if(ov!==undefined && ov!==null && ov!=='') return Number(ov)||0;
  return group ? (Number(group.fee)||0) : 0;
};

const monthLabel = (mk) => {
  const [y,m] = mk.split('-');
  const names = ["يناير","فبراير","مارس","إبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];

};

const qrPayload = (id) => 'SAMYSCHOOL:'+id;
const parseQrPayload = (text) => {
  if(!text) return null;
  const t = text.trim();
  if(t.startsWith('SAMYSCHOOL:')) return t.slice('SAMYSCHOOL:'.length);
  if(t.startsWith('SS-')) return t.slice(3).toLowerCase();
  return t;
};

// Normalizes an Egyptian mobile number ("01xxxxxxxxx" or with spaces/dashes/+)
// into the international format wa.me requires (no plus, no leading zero).
const normalizeEgyptPhone = (phone) => {
  if(!phone) return null;
  let p = phone.replace(/[^0-9]/g,'');
  if(p.startsWith('0020')) p = p.slice(2);
  if(p.startsWith('20')) return p;
  if(p.startsWith('0')) return '20'+p.slice(1);
  if(p.length===10) return '20'+p; // missing leading 0
  return p;
};

function computeStudentMonthStats(student, month, attendance, grades, payments, groupById){
  const group = groupById(student.groupId);
  const monthAttendance = attendance.filter(a=>a.groupId===student.groupId && a.date.startsWith(month) && a.records && (student.id in a.records));
  const presentCount = monthAttendance.filter(a=>a.records[student.id]==='present').length;
  const absentDates = monthAttendance.filter(a=>a.records[student.id]==='absent').map(a=>a.date);
  const rate = monthAttendance.length ? Math.round((presentCount/monthAttendance.length)*100) : null;
  const monthExams = grades.filter(g=>g.groupId===student.groupId && g.date.startsWith(month));
  const examsAvg = monthExams.length ? Math.round(monthExams.reduce((s,e)=>s+((e.scores?.[student.id]||0)/(e.maxScore||1))*100,0)/monthExams.length) : null;
  const paymentRec = payments.find(p=>p.studentId===student.id && p.month===month);
  const paid = !!(paymentRec && paymentRec.paid);
  return {group, rate, absentDates, monthExams, examsAvg, paid};
}

function buildWhatsAppReportLink(student, month, stats){
  const phone = normalizeEgyptPhone(student.parentPhone);
  if(!phone) return null;
  const lines = [
    `مرحبًا 🌟 تقرير متابعة الابن/ة *${student.name}* لشهر ${monthLabel(month)} من SamySchool:`,
    ``,
    `📌 نسبة الحضور: ${stats.rate===null?'لا يوجد حصص مسجلة':stats.rate+'%'}`,
  ];
  if(stats.absentDates.length>0) lines.push(`❌ أيام الغياب: ${stats.absentDates.join('، ')}`);
  lines.push(`📝 متوسط الدرجات: ${stats.examsAvg===null?'لا يوجد اختبارات':stats.examsAvg+'%'}`);
  lines.push(`💳 حالة السداد: ${stats.paid?'تم السداد ✅':'متأخر ⚠️'}`);
  lines.push(``, `نتمنى له/لها المزيد من التقدم 🌱`, `SamySchool`);
  const text = encodeURIComponent(lines.join('\n'));
  return `https://wa.me/${phone}?text=${text}`;
}

// Counts how many of the most recent consecutive sessions were absences
// (stops counting at the first "present" found going backwards from today).
function consecutiveAbsences(student, attendance){
  const recs = attendance
    .filter(a=> a.groupId===student.groupId && a.records && (student.id in a.records))
    .sort((a,b)=> b.date.localeCompare(a.date));
  let streak = 0;
  for(const r of recs){
    if(r.records[student.id]==='absent') streak++;
    else break;
  }
  return streak;
}

// Diffs newArray against the last-known state for a collection and writes only
// the changed/added/removed documents to Firestore, so history-heavy
// collections (attendance, payments) do not get fully rewritten on every save.
// Logs non-admin (secretary) writes to activityLog for the admin's daily security report,
// and attaches a full snapshot of the affected collection right after the change (instant backup).
async function logActivity(user, role, collectionName, changes){
  if(!user || role==='admin') return; // only audit secretary actions per spec
  const parts = [];
  if(changes.created.length) parts.push(`إضافة ${changes.created.length}`);
  if(changes.updated.length) parts.push(`تعديل ${changes.updated.length}`);
  if(changes.deleted.length) parts.push(`حذف ${changes.deleted.length}`);
  if(parts.length===0) return;
  try{
    const snap = JSON.stringify(changes.newArray);
    await db.collection('activityLog').add({
      actorEmail: user.email,
      actorRole: role,
      collection: collectionName,
      created: changes.created,
      updated: changes.updated,
      deleted: changes.deleted,
      summary: parts.join('، ') + ' في ' + collectionName,
      snapshotAfter: snap.length < 800000 ? snap : null, // instant backup, skipped if too large for one doc
      at: firebase.firestore.FieldValue.serverTimestamp(),
      dateKey: todayISO(),
    });
  }catch(err){ console.error('activity log failed', err); }
}

function makePersist(name, stateRef, setter, actorRef){
  return async (newArray) => {
    const oldArray = stateRef.current || [];
    setter(newArray); // optimistic local update; onSnapshot will reconcile
    const batch = db.batch();
    const newIds = new Set();
    const created=[], updated=[];
    newArray.forEach(item=>{
      newIds.add(item.id);
      const old = oldArray.find(o=>o.id===item.id);
      if(!old){ created.push(item.id); const {id, ...rest} = item; batch.set(db.collection(name).doc(id), rest); }
      else if(JSON.stringify(old)!==JSON.stringify(item)){ updated.push(item.id); const {id, ...rest} = item; batch.set(db.collection(name).doc(id), rest); }
    });
    const deleted=[];
    oldArray.forEach(item=>{
      if(!newIds.has(item.id)){ deleted.push(item.id); batch.delete(db.collection(name).doc(item.id)); }
    });
    try{
      await batch.commit();
      const actor = actorRef ? actorRef.current : null;
      if(actor) logActivity(actor.user, actor.role, name, {created,updated,deleted,newArray});
    }
    catch(err){ console.error(err); alert('فشل الحفظ: '+(err.message||'')+'\n(تأكد إن عندك صلاحية لهذا الإجراء)'); }
  };
}

  const [expenses,setExpenses] = useState([]);
  const [privateLessons,setPrivateLessons] = useState([]);

  const teachersRef = React.useRef([]); teachersRef.current = teachers;
  const groupsRef = React.useRef([]); groupsRef.current = groups;
  const studentsRef = React.useRef([]); studentsRef.current = students;
  const attendanceRef = React.useRef([]); attendanceRef.current = attendance;
  const gradesRef = React.useRef([]); gradesRef.current = grades;
  const paymentsRef = React.useRef([]); paymentsRef.current = payments;
  const expensesRef = React.useRef([]); expensesRef.current = expenses;
  const privateLessonsRef = React.useRef([]); privateLessonsRef.current = privateLessons;
  const actorRef = React.useRef({user:null, role:null});
  useEffect(()=>{ actorRef.current = {user, role}; },[user,role]);

  // Auth: watch sign-in state and load this user role from /users/{uid}
  useEffect(()=>{
    const unsub = auth.onAuthStateChanged(async (u)=>{
      if(!u){ setUser(null); setRole(null); setAuthLoading(false); return; }
      setUser(u);
      try{
        const doc = await db.collection('users').doc(u.uid).get();
        setRole(doc.exists ? doc.data().role : null);
      }catch(err){ console.error(err); setRole(null); }
      setAuthLoading(false);
    });
    return unsub;
  },[]);

  // Live Firestore sync, only once signed in with a known role
  useEffect(()=>{
    if(!user || !role) return;
    // "expenses" is admin-only by design (see Firestore rules) - secretary accounts
    // should never even attempt to read it, so it is excluded from their subscription list.
    const activeCollections = role==='admin' ? COLLECTIONS : COLLECTIONS.filter(c=>c!=='expenses');
    let pending = activeCollections.length;
    const settle = () => { if(pending>0){ pending--; if(pending===0) setDataLoaded(true); } };
    const setters = {teachers:setTeachers, groups:setGroups, students:setStudents, attendance:setAttendance, grades:setGrades, payments:setPayments, expenses:setExpenses, privateLessons:setPrivateLessons};
    const unsubs = activeCollections.map(name=>
      db.collection(name).onSnapshot(snap=>{
        setters[name](snap.docs.map(d=>({id:d.id, ...d.data()})));
        settle();
      }, err=>{
        console.error(name, err);
        setLoadErrors(prev=> prev.includes(name)?prev:[...prev,name]);
        settle(); // do not let one blocked collection hang the whole app forever
      })
    );
    // seed default teachers if the collection is empty (first run)
    db.collection('teachers').get().then(snap=>{
      if(snap.empty){
        const batch = db.batch();
        DEFAULT_TEACHERS.forEach(t=>{ const {id,...rest}=t; batch.set(db.collection('teachers').doc(id), rest); });
        batch.commit().catch(err=>console.error(err));
      }
    });
    return ()=>unsubs.forEach(u=>u());
  },[user,role]);

  // One-time auto-fix: mark the academy owner and apply the 70% commission to his
  // colleagues groups automatically, so the admin never has to click through this by hand.
  const migrationRanRef = React.useRef(false);
  useEffect(()=>{
    if(role!=='admin' || !dataLoaded || migrationRanRef.current) return;
    if(teachers.length===0) return;
    migrationRanRef.current = true;

    const owner = teachers.find(t=>t.id==='t-samy' || t.name.includes('محمد سامي'));
    if(owner && !owner.isOwner){
      persistTeachers(teachers.map(t=>t.id===owner.id?{...t,isOwner:true}:t));
    }

    const commissionTeacherIds = teachers.filter(t=>t.id==='t-gouda' || t.id==='t-amer' || t.name.includes('جودة') || t.name.includes('عامر')).map(t=>t.id);
    const needsFix = groups.some(g=>commissionTeacherIds.includes(g.teacherId) && Number(g.commissionPercent)!==70);
    if(needsFix){
      persistGroups(groups.map(g=> commissionTeacherIds.includes(g.teacherId) ? {...g, commissionPercent:70} : g));
    }
  },[role,dataLoaded,teachers,groups]);

  const persistTeachers = React.useCallback(makePersist('teachers', teachersRef, setTeachers, actorRef),[]);
  const persistGroups = React.useCallback(makePersist('groups', groupsRef, setGroups, actorRef),[]);
  const persistStudents = React.useCallback(makePersist('students', studentsRef, setStudents, actorRef),[]);
  const persistAttendance = React.useCallback(makePersist('attendance', attendanceRef, setAttendance, actorRef),[]);
  const persistGrades = React.useCallback(makePersist('grades', gradesRef, setGrades, actorRef),[]);
  const persistPayments = React.useCallback(makePersist('payments', paymentsRef, setPayments, actorRef),[]);
  const persistExpenses = React.useCallback(makePersist('expenses', expensesRef, setExpenses, actorRef),[]);
  const persistPrivateLessons = React.useCallback(makePersist('privateLessons', privateLessonsRef, setPrivateLessons, actorRef),[]);

  const groupById = useCallback((id)=> groups.find(g=>g.id===id), [groups]);
  const teacherById = useCallback((id)=> teachers.find(t=>t.id===id), [teachers]);
  const studentsInGroup = useCallback((gid)=> students.filter(s=>s.groupId===gid), [students]);

  // payment status helper for a student in a given month
  const paymentFor = (studentId, mk) => payments.find(p=>p.studentId===studentId && p.month===mk);

  const todayAttendanceRate = useMemo(()=>{
    const todays = attendance.filter(a=>a.date===todayISO());

    let present=0,total=0;
    todays.forEach(rec=>{
      Object.values(rec.records||{}).forEach(v=>{ total++; if(v==='present') present++; });
    });
    if(total===0) return null;
    return Math.round((present/total)*100);

  const monthRevenue = useMemo(()=>{

    reader.onload = (e) => {
      try{
        const data = JSON.parse(e.target.result);
        if(data.teachers) persistTeachers(data.teachers);
        if(data.groups) persistGroups(data.groups);
        if(data.students) persistStudents(data.students);
        if(data.attendance) persistAttendance(data.attendance);

        if(data.payments) persistPayments(data.payments);

  return (

// Admin-only daily security report: every create/edit/delete the secretary makes anywhere
// in the system today, newest first. Backed by the activityLog collection (see makePersist).
function SecretaryActivityCard(){
  const [logs,setLogs] = useState([]);
  useEffect(()=>{
    const today = todayISO();
    const unsub = db.collection('activityLog').where('dateKey','==',today).onSnapshot(snap=>{
      const list = snap.docs.map(d=>({id:d.id,...d.data()}));
      list.sort((a,b)=> (b.at && b.at.toMillis ? b.at.toMillis() : 0) - (a.at && a.at.toMillis ? a.at.toMillis() : 0));
      setLogs(list);
    }, err=>console.error(err));
    return unsub;
  },[]);

  if(logs.length===0) return null;

  return (
    <div className="card" style={{marginBottom:18, borderColor:'var(--charcoal)'}}>
      <div className="section-title">🛡 نشاط السكرتيرة اليوم ({logs.length})</div>
      <table>
        <thead><tr><th>الوقت</th><th>الحساب</th><th>القسم</th><th>التفاصيل</th></tr></thead>
        <tbody>
          {logs.map(l=>(
            <tr key={l.id}>
              <td className="small muted">{l.at && l.at.toDate ? l.at.toDate().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'}) : '—'}</td>
              <td className="small">{l.actorEmail}</td>
              <td className="small">{l.collection}</td>
              <td className="small">{l.summary}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );

function StudentsTab({students,groups,persistStudents,payments,currentMonth,groupById,attendance,isAdmin}){
  const [query,setQuery] = useState('');
  const [filterGroup,setFilterGroup] = useState('all');
  const [editing,setEditing] = useState(null); // student obj or 'new'

  const filtered = students.filter(s=>{
    const matchQ = s.name.toLowerCase().includes(query.toLowerCase()) || (s.phone||'').includes(query) || (s.parentPhone||'').includes(query);
    const matchG = filterGroup==='all' || s.groupId===filterGroup;
    return matchQ && matchG;
  });

  const openNew = () => setEditing({id:uid(),isNew:true,name:'',phone:'',parentPhone:'',schoolName:'',educationType:EDUCATION_TYPES[0],stage:STAGES[0],groupId:groups[0]?groups[0].id:'',feeOverride:'',joinDate:todayISO(),notes:''});

  const save = (data) => {
    const {isNew, ...clean} = data;
    const exists = students.some(s=>s.id===clean.id);
    if(exists){
      persistStudents(students.map(s=>s.id===clean.id?clean:s));
    }else{
      persistStudents([...students, clean]);
    }
    setEditing(null);
  };
  const remove = (id) => {
    if(confirm('تأكيد حذف الطالب؟ سيتم حذف كل بياناته من الحضور والدرجات والمدفوعات المرتبطة به يدوياً.')){
      persistStudents(students.filter(s=>s.id!==id));
    }
  };

  const attendanceRate = (studentId) => {
    const recs = attendance.filter(a=>{
      const st = students.find(x=>x.id===studentId);
      return st && a.groupId===st.groupId && a.records && (studentId in a.records);
    });
    if(recs.length===0) return null;
    const present = recs.filter(r=>r.records[studentId]==='present').length;
    return Math.round((present/recs.length)*100);
  };

  return (
    <div>
      <div className="topbar">
        <div><h1>الطلاب</h1><div className="date">{students.length} طالب مسجل</div></div>
        <button className="btn btn-primary" onClick={openNew}>+ إضافة طالب جديد</button>
      </div>

      <div className="toolbar">
        <input className="search" placeholder="ابحث بالاسم أو رقم الهاتف..." value={query} onChange={e=>setQuery(e.target.value)} />
        <div className="chip-row">
          <span className={"chip "+(filterGroup==='all'?'active':'')} onClick={()=>setFilterGroup('all')}>الكل</span>
          {groups.map(g=><span key={g.id} className={"chip "+(filterGroup===g.id?'active':'')} onClick={()=>setFilterGroup(g.id)}>{g.name}</span>)}
        </div>
      </div>

      <div className="card">
        {filtered.length===0 ? <Empty icon="👤" text="لا يوجد طلاب مطابقين — أضف طالب جديد من الأعلى" /> : (
          <table>
            <thead><tr><th>الطالب</th><th>المجموعة</th><th>المستوى</th><th>هاتف ولي الأمر</th><th>نسبة الحضور</th><th>سداد {monthLabel(currentMonth)}</th><th></th></tr></thead>
            <tbody>
              {filtered.map(s=>{
                const g = groupById(s.groupId);
                const rate = attendanceRate(s.id);
                const paid = payments.some(p=>p.studentId===s.id && p.month===currentMonth && p.paid);
                return (
                  <tr key={s.id}>
                    <td className="student-row"><span className="avatar">{initials(s.name)}</span>{s.name}</td>
                    <td>{g?g.name:<span className="muted">بدون مجموعة</span>}</td>
                    <td>{s.stage}</td>
                    <td>{s.parentPhone||'—'}</td>
                    <td>{rate===null?<span className="muted">—</span>:<span className={"badge "+(rate>=80?'badge-green':rate>=50?'badge-amber':'badge-rose')}>{rate}%</span>}</td>
                    <td>{paid?<span className="badge badge-green">تم السداد</span>:<span className="badge badge-rose">متأخر</span>}</td>
                    <td>
                      <div style={{display:'flex',gap:6}}>
                        <button className="btn btn-ghost btn-sm" onClick={()=>setEditing(s)}>تعديل</button>
                        {isAdmin && <button className="btn btn-danger btn-sm" onClick={()=>remove(s.id)}>حذف</button>}
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </div>

      {editing && (
        <Modal title={editing.isNew?'إضافة طالب جديد':'تعديل بيانات الطالب'} onClose={()=>setEditing(null)}>
          <StudentForm student={editing} groups={groups} onCancel={()=>setEditing(null)} onSave={save} />
        </Modal>
      )}
    </div>
  );
}

function AttendanceTab({groups,students,attendance,persistAttendance,studentsInGroup}){
  const [groupId,setGroupId] = useState(groups[0]?groups[0].id:'');
  const [date,setDate] = useState(todayISO());
  const [showHistory,setShowHistory] = useState(false);

  useEffect(()=>{ if(!groupId && groups[0]) setGroupId(groups[0].id); },[groups]);

  const roster = studentsInGroup(groupId);
  const existing = attendance.find(a=>a.groupId===groupId && a.date===date);
  const [records,setRecords] = useState(existing?existing.records:{});

  useEffect(()=>{
    const ex = attendance.find(a=>a.groupId===groupId && a.date===date);
    setRecords(ex?{...ex.records}:{});
  },[groupId,date,attendance]);

  const toggle = (sid) => {
    setRecords(r=>({...r, [sid]: r[sid]==='present' ? 'absent' : 'present'}));
  };
  const markAll = (status) => {
    const r = {}; roster.forEach(s=>r[s.id]=status); setRecords(r);
  };

  const save = () => {
    const rec = {id: existing?existing.id:uid(), groupId, date, records};
    const others = attendance.filter(a=>!(a.groupId===groupId && a.date===date));
    persistAttendance([...others, rec]);
    alert('تم حفظ الحضور بنجاح');
  };

  const history = attendance.filter(a=>a.groupId===groupId).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,15);

  return (
    <div>
      <div className="topbar">
        <div><h1>الحضور والغياب</h1><div className="date">سجّل حضور المجموعة في ثوانٍ</div></div>
      </div>

      <div className="toolbar">
        <select style={{maxWidth:260}} value={groupId} onChange={e=>setGroupId(e.target.value)}>
          {groups.length===0 && <option value="">لا توجد مجموعات</option>}
          {groups.map(g=><option key={g.id} value={g.id}>{g.name}</option>)}
        </select>
        <input type="date" style={{maxWidth:180}} value={date} onChange={e=>setDate(e.target.value)} />
        <button className="btn btn-ghost btn-sm" onClick={()=>markAll('present')}>✓ تحديد الكل حاضر</button>
        <button className="btn btn-ghost btn-sm" onClick={()=>markAll('absent')}>✕ تحديد الكل غائب</button>
        <button className="btn btn-primary" style={{marginRight:'auto'}} onClick={save} disabled={!groupId || roster.length===0}>حفظ الحضور</button>
      </div>

      {!groupId || roster.length===0 ? (
        <div className="card"><Empty icon="✓" text={groups.length===0 ? 'أضف مجموعة أولاً من تبويب المجموعات' : 'لا يوجد طلاب في هذه المجموعة بعد'} /></div>

function PaymentsTab({students,groups,payments,persistPayments,groupById,setReceiptData,isAdmin}){
  const [month,setMonth] = useState(monthKey());
  const [filterGroup,setFilterGroup] = useState('all');
  const [onlyOverdue,setOnlyOverdue] = useState(false);

  const list = students.filter(s=>filterGroup==='all'||s.groupId===filterGroup);

  const recordFor = (sid) => payments.find(p=>p.studentId===sid && p.month===month);

  const nextReceiptNo = () => payments.filter(p=>p.receiptNo).length + 1;

  const togglePaid = (student) => {
    const g = groupById(student.groupId);
    const existing = recordFor(student.id);
    const recipientLabel = isAdmin ? 'مستر محمد سامي' : 'السكرتيرة';
    if(existing){
      const willBePaid = !existing.paid;
      persistPayments(payments.map(p=>p.id===existing.id ? {...p, paid: willBePaid, paidDate: willBePaid? todayISO() : null, paidAt: willBePaid ? new Date().toISOString() : null, paidBy: willBePaid ? recipientLabel : null, receiptNo: willBePaid ? (p.receiptNo||nextReceiptNo()) : p.receiptNo} : p));
    }else{
      persistPayments([...payments, {id:uid(), studentId:student.id, month, amount: studentFee(student,g), paid:true, paidDate:todayISO(), paidAt:new Date().toISOString(), paidBy:recipientLabel, receiptNo:nextReceiptNo()}]);
    }
  };

  const printReceipt = (student) => {
    const g = groupById(student.groupId);
    const r = recordFor(student.id);
    if(!r || !r.paid) return;
    const paidDateObj = r.paidAt ? new Date(r.paidAt) : new Date(r.paidDate || todayISO());
    setReceiptData({
      receiptNo: r.receiptNo || '—',
      studentName: student.name,
      groupName: g?g.name:'—',
      month,
      amount: r.amount,
      date: r.paidDate || todayISO(),
      dayName: SCHED_DAY_NAMES[paidDateObj.getDay()],
      time: paidDateObj.toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit',hour12:true}),
      recipient: r.paidBy || (isAdmin ? 'مستر محمد سامي' : 'السكرتيرة'),
    });
  };

  const visibleList = list.filter(s=>{
    if(!onlyOverdue) return true;
    const r = recordFor(s.id);
    return !(r && r.paid);
  });

  const totalCollected = list.reduce((sum,s)=>{ const r=recordFor(s.id); return sum + (r&&r.paid?Number(r.amount)||0:0); },0);
  const totalExpected = list.reduce((sum,s)=>{ const g=groupById(s.groupId); return sum + studentFee(s,g); },0);

  return (
    <div>
      <div className="topbar">
        <div><h1>متابعة المصروفات</h1><div className="date">تسجيل ومتابعة سداد الاشتراكات الشهرية</div></div>
      </div>

      <div className="grid grid-3" style={{marginBottom:18}}>
        <div className="card"><div className="stat-label">إجمالي المتوقع — {monthLabel(month)}</div><div className="stat-value">{fmtMoney(totalExpected)}</div></div>
        <div className="card"><div className="stat-label">تم تحصيله</div><div className="stat-value" style={{color:'var(--green)'}}>{fmtMoney(totalCollected)}</div></div>
        <div className="card"><div className="stat-label">متبقي</div><div className="stat-value" style={{color:'var(--rose)'}}>{fmtMoney(totalExpected-totalCollected)}</div></div>
      </div>

      <div className="toolbar">
        <input type="month" style={{maxWidth:170}} value={month} onChange={e=>setMonth(e.target.value)} />
        <select style={{maxWidth:220}} value={filterGroup} onChange={e=>setFilterGroup(e.target.value)}>
          <option value="all">كل المجموعات</option>
          {groups.map(g=><option key={g.id} value={g.id}>{g.name}</option>)}
        </select>
        <span className={"chip "+(onlyOverdue?'active':'')} onClick={()=>setOnlyOverdue(!onlyOverdue)}>عرض المتأخرين فقط</span>
      </div>

      <div className="card">
        {visibleList.length===0 ? <Empty icon="৳" text="لا يوجد طلاب مطابقين" /> : (
          <table>
            <thead><tr><th>الطالب</th><th>المجموعة</th><th>القسط</th><th>الحالة</th><th>تاريخ السداد</th><th></th></tr></thead>
            <tbody>
              {visibleList.map(s=>{
                const g = groupById(s.groupId);
                const r = recordFor(s.id);
                const paid = r && r.paid;
                return (
                  <tr key={s.id}>
                    <td className="student-row"><span className="avatar">{initials(s.name)}</span>{s.name}</td>
                    <td>{g?g.name:'—'}</td>
                    <td>{fmtMoney(studentFee(s,g))}</td>
                    <td>{paid?<span className="badge badge-green">تم السداد</span>:<span className="badge badge-rose">متأخر</span>}</td>
                    <td className="small muted">{paid && r.paidDate ? r.paidDate : '—'}</td>
                    <td>
                      <div style={{display:'flex',gap:6}}>
                        {(!paid || isAdmin) && <button className={"btn btn-sm "+(paid?'btn-ghost':'btn-primary')} onClick={()=>togglePaid(s)}>{paid?'إلغاء السداد':'تسجيل سداد'}</button>}
                        {paid && <button className="btn btn-ghost btn-sm" onClick={()=>printReceipt(s)}>🖶 إيصال</button>}
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

// ============================= Schedule ("جدولي") — admin-only personal weekly schedule =============================
// Firestore collection: scheduleEvents. Business rules per Mohamed's real constraints:
// - School: Sun-Thu, fixed, 07:30-15:15, computed client-side (never stored).
// - Center room: only Sun/Mon/Wed/Thu, groups start 4pm-8pm (a rented teacher uses the
//   room Tue/Sat until 8pm, so the center is closed those two days).
// - Online/Private: same 4 days as center but only after 9pm; Tue/Fri/Sat open 4pm-10pm.
const SCHED_DAY_NAMES = ["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
const SCHED_DAY_SHORT = ["أحد","اثنين","ثلاثاء","أربعاء","خميس","جمعة","سبت"];
const SCHED_GRID_START = 7*60, SCHED_GRID_END = 23*60;
const SCHOOL_DAYS = [0,1,2,3,4];
const SCHOOL_START_T = "07:30", SCHOOL_END_T = "15:15";
const CENTER_DAYS = [0,1,3,4];
const CENTER_START = 16*60, CENTER_LAST = 20*60;
const ONLINE_RESTRICTED_DAYS = [0,1,3,4];
const ONLINE_RESTRICTED_START = 21*60, ONLINE_RESTRICTED_LAST = 22*60;
const ONLINE_OPEN_DAYS = [2,5,6];
const ONLINE_OPEN_START = 16*60, ONLINE_OPEN_LAST = 22*60;

const schedTimeToMin = (t) => { const [h,m]=t.split(':').map(Number); return h*60+m; };
const schedMinToTime = (min) => { const h=Math.floor(min/60), m=min%60; return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`; };
const schedFmt12 = (t) => { const [h,m]=t.split(':').map(Number); const p=h>=12?'م':'ص'; let hh=h%12; if(hh===0)hh=12; return `${hh}:${String(m).padStart(2,'0')} ${p}`; };
const schedTypeLabel = (t) => ({school:'المدرسة',center:'مجموعة سنتر',online:'أونلاين',private:'خصوصي/منزلي'}[t]||t);

// ---- Booking card (PNG) — drawn on a canvas, uses the same LOGO_SRC/brand colors as the rest of the app ----
const SCHED_TERM_START = '1 سبتمبر'; // start of the new academic year, shown on every card

function schedDrawRoundedRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}
function schedWrapCenteredText(ctx, text, cx, y, maxWidth, lineHeight){
  ctx.textAlign = 'center';
  const words = text.split(' ');
  let line = '', lines = [];
  words.forEach(w=>{
    const test = line ? line+' '+w : w;
    if(ctx.measureText(test).width > maxWidth && line){ lines.push(line); line = w; }
    else line = test;
  });
  if(line) lines.push(line);
  lines.forEach((l,i)=>ctx.fillText(l, cx, y + i*lineHeight));
  return lines.length;
}

async function generateBookingCard(event){
  if(document.fonts && document.fonts.ready){ try{ await document.fonts.ready; }catch(e){} }
  return new Promise((resolve,reject)=>{
    const W=1080, H=1350;
    const canvas = document.createElement('canvas');
    canvas.width=W; canvas.height=H;
    const ctx = canvas.getContext('2d');

    ctx.fillStyle = '#faf6f1';
    ctx.fillRect(0,0,W,H);

  });

const schedSchoolBlocks = () => {
  const dur = schedTimeToMin(SCHOOL_END_T) - schedTimeToMin(SCHOOL_START_T);
  return SCHOOL_DAYS.map(d=>({id:'school_'+d, type:'school', name:'المدرسة (دوام رسمي)', area:'', link:'', days:[d], start:SCHOOL_START_T, duration:dur, fixed:true}));
};
const schedOccurrences = (events) => {
  const out = [];
  events.forEach(ev=>{ (ev.days||[]).forEach(d=>{ const startMin = schedTimeToMin(ev.start); out.push({...ev, day:d, startMin, endMin:startMin+ev.duration}); }); });
  return out;
};
const schedOverlaps = (a,b) => a.startMin < b.endMin && b.startMin < a.endMin;
const schedWithConflicts = (occs) => {
  const byDay = {};
  occs.forEach(o=>{ (byDay[o.day] ||= []).push(o); });
  const flagged = new Set();
  Object.values(byDay).forEach(list=>{
    for(let i=0;i<list.length;i++) for(let j=i+1;j<list.length;j++){
      if(schedOverlaps(list[i],list[j])){ flagged.add(list[i].id+'_'+list[i].day); flagged.add(list[j].id+'_'+list[j].day); }
    }
  });
  return occs.map(o=>({...o, conflict: flagged.has(o.id+'_'+o.day)}));
};

// ---- Countdown helpers (used by GlobalHeader and ScheduleTab's local header) ----
function schedNextOccurrence(events, now){
  const occs = schedOccurrences(events);
  if(occs.length===0) return null;
  const nowDay = now.getDay();
  const nowMin = now.getHours()*60 + now.getMinutes() + now.getSeconds()/60;
  let best = null;
  occs.forEach(o=>{
    let daysUntil = (o.day - nowDay + 7) % 7;
    if(daysUntil===0 && o.startMin <= nowMin) daysUntil = 7;
    const target = new Date(now);
    target.setDate(target.getDate() + daysUntil);
    target.setHours(Math.floor(o.startMin/60), o.startMin%60, 0, 0);
    const msLeft = target - now;
    if(msLeft >= 0 && (!best || msLeft < best.msLeft)) best = {...o, msLeft, target};
  });
  return best;
}
function schedFormatCountdown(ms){
  if(ms<0) ms=0;
  const totalMin = Math.floor(ms/60000);
  const days = Math.floor(totalMin/1440);
  const hours = Math.floor((totalMin%1440)/60);
  const mins = totalMin%60;
  if(days>0) return `${days} يوم ${hours} س`;
  if(hours>0) return `${hours} س ${mins} د`;
  const secs = Math.floor((ms%60000)/1000);
  return `${mins} د ${secs} ث`;
}
function schedNextDateForDay(day, now=new Date()){
  const diff = (day - now.getDay() + 7) % 7;
  const d = new Date(now);
  d.setDate(d.getDate()+diff);
  return d;
}
function schedIsoLocal(date, hhmm){
  const [h,m] = hhmm.split(':').map(Number);
  const y=date.getFullYear(), mo=String(date.getMonth()+1).padStart(2,'0'), da=String(date.getDate()).padStart(2,'0');
  return `${y}-${mo}-${da}T${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:00`;
}

// ---- Google Calendar one-click sync ----
// Creates/updates/deletes weekly-recurring events on a dedicated "جدول Samy School" calendar,
// mirroring exactly what's in scheduleEvents (deleted local events are deleted on Google too).
const RRULE_DAY_CODES = ['SU','MO','TU','WE','TH','FR','SA'];
let gcalTokenClient = null;
let gcalTokenCache = {token:null, expiresAt:0};

function getGoogleAccessToken(){
  return new Promise((resolve,reject)=>{
    if(gcalTokenCache.token && Date.now() < gcalTokenCache.expiresAt - 30000){ resolve(gcalTokenCache.token); return; }
    if(!window.google || !window.google.accounts || !window.google.accounts.oauth2){
      reject(new Error('مكتبة Google لسه مش محمّلة، جرّب تاني بعد لحظة.')); return;
    }
    if(!gcalTokenClient){
      gcalTokenClient = window.google.accounts.oauth2.initTokenClient({
        client_id: GOOGLE_CLIENT_ID,
        scope: 'https://www.googleapis.com/auth/calendar.events',
        callback: () => {},
      });
    }
    gcalTokenClient.callback = (resp) => {
      if(resp.error){ reject(new Error(resp.error)); return; }
      gcalTokenCache = {token: resp.access_token, expiresAt: Date.now() + (resp.expires_in*1000)};
      resolve(resp.access_token);
    };
    gcalTokenClient.requestAccessToken({prompt: gcalTokenCache.token ? '' : 'consent'});
  });
}

async function ensureSamySchoolCalendar(token){
  const metaRef = db.collection('meta').doc('googleCalendarSync');
  const metaSnap = await metaRef.get();
  const meta = metaSnap.exists ? metaSnap.data() : {};
  if(meta.calendarId){
    const check = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${meta.calendarId}`, {headers:{Authorization:'Bearer '+token}});
    if(check.ok) return meta.calendarId;
  }
  const res = await fetch('https://www.googleapis.com/calendar/v3/calendars', {
    method:'POST',
    headers:{Authorization:'Bearer '+token, 'Content-Type':'application/json'},
    body: JSON.stringify({summary:'جدول Samy School', timeZone:'Africa/Cairo'}),
  });
  if(!res.ok) throw new Error('تعذّر إنشاء تقويم جديد على Google');
  const data = await res.json();
  await metaRef.set({calendarId:data.id}, {merge:true});
  return data.id;
}

async function syncScheduleToGoogle(events){
  const token = await getGoogleAccessToken();
  const calendarId = await ensureSamySchoolCalendar(token);
  const metaRef = db.collection('meta').doc('googleCalendarSync');
  const metaSnap = await metaRef.get();
  const meta = metaSnap.exists ? metaSnap.data() : {};
  const map = {...(meta.map||{})};

  let created=0, updated=0, deleted=0;
  const currentIds = new Set(events.map(e=>e.id));

  for(const ev of events){
    const days = [...ev.days].sort((a,b)=>a-b);
    const startDates = days.map(d=>schedNextDateForDay(d)).sort((a,b)=>a-b);
    const startDate = startDates[0];
    const byday = days.map(d=>RRULE_DAY_CODES[d]).join(',');
    const body = {
      summary: `${schedTypeLabel(ev.type)} — ${ev.name}`,
      description: ev.area ? `العنوان: ${ev.area}` : (ev.link ? `الرابط: ${ev.link}` : ''),
      start: {dateTime: schedIsoLocal(startDate, ev.start), timeZone:'Africa/Cairo'},
      end: {dateTime: schedIsoLocal(startDate, schedMinToTime(schedTimeToMin(ev.start)+ev.duration)), timeZone:'Africa/Cairo'},
      recurrence: [`RRULE:FREQ=WEEKLY;BYDAY=${byday}`],
      reminders: {useDefault:false, overrides:[{method:'popup', minutes:15}]},
    };
    if(map[ev.id]){
      const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${calendarId}/events/${map[ev.id]}`, {
        method:'PATCH', headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'}, body:JSON.stringify(body)
      });
      if(res.ok) updated++;
      else if(res.status===404){
        const res2 = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${calendarId}/events`, {
          method:'POST', headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'}, body:JSON.stringify(body)
        });
        if(res2.ok){ const d2 = await res2.json(); map[ev.id]=d2.id; created++; }
      }
    }else{
      const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${calendarId}/events`, {
        method:'POST', headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'}, body:JSON.stringify(body)
      });
      if(res.ok){ const d = await res.json(); map[ev.id]=d.id; created++; }
    }
  }

  for(const oldId of Object.keys(map)){
    if(!currentIds.has(oldId)){
      const gid = map[oldId];
      await fetch(`https://www.googleapis.com/calendar/v3/calendars/${calendarId}/events/${gid}`, {method:'DELETE', headers:{Authorization:'Bearer '+token}}).catch(()=>{});
      delete map[oldId];
      deleted++;
    }
  }

  await metaRef.set({calendarId, map}, {merge:true});
  return {created, updated, deleted};
}
const schedSlotsForDay = (day, kind, allEvents) => {
  let open, startMin, lastStart, step=60;
  if(kind==='center'){
    open = CENTER_DAYS.includes(day); startMin=CENTER_START; lastStart=CENTER_LAST;
  }else{
    if(ONLINE_RESTRICTED_DAYS.includes(day)){ open=true; startMin=ONLINE_RESTRICTED_START; lastStart=ONLINE_RESTRICTED_LAST; }
    else if(ONLINE_OPEN_DAYS.includes(day)){ open=true; startMin=ONLINE_OPEN_START; lastStart=ONLINE_OPEN_LAST; }
    else open=false;
  }
  if(!open) return {open:false, slots:[]};
  const occs = schedOccurrences(allEvents).filter(o=>o.day===day);
  const slots = [];
  for(let m=startMin;m<=lastStart;m+=step){
    const cand = {startMin:m, endMin:m+60};
    const taken = occs.some(o=>schedOverlaps(o,cand));
    slots.push({start:schedMinToTime(m), taken});
  }
  return {open:true, slots};
};

    }catch(err){
      console.error(err);
      alert('حصل خطأ في المزامنة مع Google Calendar: '+(err.message||''));
    }
    setGcalStatus('idle');
  };

  const save = (data) => {
    const payload = {type:data.type, name:data.name, area:data.area||'', link:data.link||'', days:data.days, start:data.start, duration:data.duration};
    if(data.id) db.collection('scheduleEvents').doc(data.id).update(payload).catch(err=>alert('حصل خطأ: '+err.message));
    else db.collection('scheduleEvents').add(payload).catch(err=>alert('حصل خطأ: '+err.message));

    events.forEach(ev=>db.collection('scheduleEvents').doc(ev.id).delete());

    setFilters(prev=>{
      const next = new Set(prev);
      if(next.has(t)){ if(next.size>1) next.delete(t); } else next.add(t);
      return next;
    });

          <button className="btn btn-ghost btn-sm" onClick={resetAll}>تفريغ الجدول</button>
          <button className="btn btn-primary" onClick={()=>setEditing({id:null,type:'center',name:'',area:'',link:'',days:[],start:'16:00',duration:60})}>+ إضافة موعد</button>
        </div>

        <div className="sch-header-side">
          {nextAny ? (

        <div key={o.id+'_'+o.day} className={"card sch-daily-card "+(o.conflict?'conflict':'')}>
          <div className={"sch-dot "+o.type}></div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:900,fontSize:14}}>{o.name}{o.conflict?' ⚠':''}</div>
            <div className="small muted">{schedFmt12(o.start)} – {schedFmt12(schedMinToTime(o.endMin))} · {schedTypeLabel(o.type)}{o.area?' · '+o.area:''}{o.link?' · رابط متاح':''}</div>
          </div>
          {!o.fixed && <button className="btn btn-ghost btn-sm" onClick={()=>onEdit(o)}>تعديل</button>}
        </div>
      ))}
    </div>
  );
}

function ScheduleForm({event,onCancel,onSave,onDelete,allEvents}){
  const [f,setF] = useState(event);
  const set = (k,v) => setF({...f,[k]:v});
  const toggleDay = (d) => set('days', f.days.includes(d) ? f.days.filter(x=>x!==d) : [...f.days,d].sort());

  const conflictPreview = useMemo(()=>{
    if(!f.start || f.days.length===0) return false;
    const candidate = {id:f.id||'__draft__', days:f.days, start:f.start, duration:f.duration};
    const others = allEvents.filter(e=>e.id!==(f.id||''));
    const occs = schedWithConflicts(schedOccurrences([...others, candidate]));
    return occs.some(o=>(o.id==='__draft__'||o.id===f.id) && o.conflict);
  },[f,allEvents]);

  const typeColor = (t) => t==='center'?'var(--red)':t==='online'?'var(--green)':'var(--amber)';

  const downloadCard = async () => {
    if(!f.name.trim()){ alert('اكتب اسم المجموعة/الطالب الأول'); return; }
    if(f.days.length===0){ alert('اختر يوم واحد على الأقل الأول'); return; }
    try{
      const dataUrl = await generateBookingCard(f);
      const a = document.createElement('a');
      a.href = dataUrl;
      a.download = `بطاقة حجز - ${f.name}.png`;
      document.body.appendChild(a); a.click(); a.remove();
    }catch(err){
      console.error(err);
      alert('حصل خطأ أثناء إنشاء الكارت، حاول تاني.');
    }
  };

  return (
    <div>
      <Field label="نوع الموعد">
        <div className="chip-row">
          {[['center','مجموعة سنتر'],['online','أونلاين'],['private','خصوصي/منزلي']].map(([t,label])=>(
            <div key={t} className={"chip "+(f.type===t?'active':'')} onClick={()=>set('type',t)} style={f.type===t?{background:typeColor(t),borderColor:'transparent'}:{}}>{label}</div>
          ))}
        </div>
      </Field>
      <Field label={f.type==='private'?'اسم الطالب':'اسم المجموعة/الطالب'}>
        <input value={f.name} onChange={e=>set('name',e.target.value)} placeholder="مثال: الصف الثالث الثانوي - مجموعة أ" />
      </Field>
      {f.type==='private' && <Field label="العنوان / المنطقة"><input value={f.area} onChange={e=>set('area',e.target.value)} /></Field>}
      {f.type==='online' && <Field label="رابط المنصة (اختياري)"><input value={f.link} onChange={e=>set('link',e.target.value)} /></Field>}
      <Field label="أيام الحضور">
        <div className="chip-row">
          {SCHED_DAY_SHORT.map((name,d)=>(
            <div key={d} className={"chip "+(f.days.includes(d)?'active':'')} onClick={()=>toggleDay(d)}>{name}</div>
          ))}
        </div>
      </Field>
      <div className="grid grid-2">
        <Field label="وقت البدء"><input type="time" value={f.start} onChange={e=>set('start',e.target.value)} /></Field>
        <Field label="المدة الزمنية">
          <select value={f.duration} onChange={e=>set('duration',Number(e.target.value))}>
            <option value={60}>ساعة واحدة</option>
            <option value={90}>ساعة ونصف</option>
            <option value={120}>ساعتان</option>
          </select>
        </Field>
      </div>
      {conflictPreview && <div className="small" style={{color:'var(--rose)',fontWeight:800,marginBottom:8}}>⚠ هذا الموعد يتعارض مع موعد آخر — هيتحفظ برضه لكن هيتحدد باللون الأحمر.</div>}
      <button className="btn btn-ghost" style={{width:'100%',marginBottom:14,justifyContent:'center'}} onClick={downloadCard}>⬇ تحميل كارت الحجز (PNG) لإرساله للطالب</button>
      <div className="modal-actions">
        <button className="btn btn-primary" onClick={()=>{
          if(!f.name.trim()){ alert('أدخل اسم المجموعة/الطالب'); return; }
          if(f.days.length===0){ alert('اختر يوم واحد على الأقل'); return; }
          onSave(f);
        }}>حفظ</button>
        <button className="btn btn-ghost" onClick={onCancel}>إلغاء</button>
        {onDelete && <button className="btn btn-danger" style={{marginRight:'auto'}} onClick={onDelete}>حذف</button>}
      </div>
    </div>
  );
}

// Read-only widget: shows ONLY center-group time slots, visible to secretary accounts too
// (Firestore rules restrict non-admin reads to type=='center' documents — see setup notes).
function CenterScheduleWidget(){
  const [centerEvents,setCenterEvents] = useState([]);
  const [loaded,setLoaded] = useState(false);
  useEffect(()=>{
    const unsub = db.collection('scheduleEvents').where('type','==','center').onSnapshot(snap=>{
      setCenterEvents(snap.docs.map(d=>({id:d.id,...d.data()})));

function AccountingTab({teachers,groups,students,attendance,payments,expenses,persistExpenses,privateLessons,groupById,currentMonth}){
  const [view,setView] = useState('expenses'); // expenses | shares | daily
  const [month,setMonth] = useState(currentMonth);
  const [day,setDay] = useState(todayISO());
  const [creating,setCreating] = useState(null);

  const EXPENSE_CATEGORIES = ['إيجار','فواتير (كهرباء/مياه/إنترنت)','رواتب','صيانة وتجهيزات','دعاية وتسويق','مذكرات ومواد تعليمية','أخرى'];

  const monthExpenses = expenses.filter(e=>e.date.startsWith(month));
  const totalExpenses = monthExpenses.reduce((s,e)=>s+(Number(e.amount)||0),0);
  const sharedExpenses = monthExpenses.filter(e=>!e.owner || e.owner==='academy');
  const totalSharedExpenses = sharedExpenses.reduce((s,e)=>s+(Number(e.amount)||0),0);
  const monthRevenue = payments.filter(p=>p.month===month && p.paid).reduce((s,p)=>s+(Number(p.amount)||0),0);

  const groupRevenue = (t) => {
    const myGroups = groups.filter(g=>g.teacherId===t.id);
    let revenue = 0;
    myGroups.forEach(g=>{
      students.filter(s=>s.groupId===g.id).forEach(s=>{
        const p = payments.find(p=>p.studentId===s.id && p.month===month && p.paid);
        if(p) revenue += Number(p.amount)||0;
      });
    });
    const avgPct = myGroups.length ? myGroups.reduce((s,g)=>s+(Number(g.commissionPercent)??50),0)/myGroups.length : 50;
    return {revenue, avgPct: Math.round(avgPct), groupCount: myGroups.length};
  };

  const commissionTeachers = teachers.filter(t=>!t.isOwner);
  const owner = teachers.find(t=>t.isOwner);

  const teacherShares = commissionTeachers.map(t=>{
    const {revenue, avgPct} = groupRevenue(t);
    const share = Math.round(revenue*avgPct/100);
    return {teacher:t, revenue, share, pct:avgPct, academyCut: revenue-share};
  });
  const totalShares = teacherShares.reduce((s,t)=>s+t.share,0);
  const academyCutFromTeachers = teacherShares.reduce((s,t)=>s+t.academyCut,0);

  let ownerBlock = null;
  if(owner){
    const {revenue:ownerGroupRevenue} = groupRevenue(owner);
    const ownerPrivateRevenue = privateLessons
      .filter(p=>p.teacherId===owner.id && p.purchaseDate && p.purchaseDate.startsWith(month))
      .reduce((s,p)=>s+(Number(p.pricePerPackage)||0),0);
    const ownerExpenses = monthExpenses.filter(e=>e.owner===owner.id).reduce((s,e)=>s+(Number(e.amount)||0),0);
    const ownerNet = ownerGroupRevenue + ownerPrivateRevenue - ownerExpenses;
    ownerBlock = {teacher:owner, ownerGroupRevenue, ownerPrivateRevenue, ownerExpenses, ownerNet};
  }

  const academyNetProfit = academyCutFromTeachers + (ownerBlock?ownerBlock.ownerNet:0) - totalSharedExpenses;

  const saveExpense = (data) => {
    if(data.id) persistExpenses(expenses.map(e=>e.id===data.id?data:e));
    else persistExpenses([...expenses,{...data,id:uid()}]);
    setCreating(null);
  };
  const removeExpense = (id) => { if(confirm('حذف هذا المصروف؟')) persistExpenses(expenses.filter(e=>e.id!==id)); };

  // daily report
  const dayAttendance = attendance.filter(a=>a.date===day);
  let dayPresent=0, dayAbsent=0;
  dayAttendance.forEach(rec=> Object.values(rec.records||{}).forEach(v=>{ if(v==='present') dayPresent++; else dayAbsent++; }));
  const dayPayments = payments.filter(p=>p.paid && p.paidDate===day);
  const dayCollected = dayPayments.reduce((s,p)=>s+(Number(p.amount)||0),0);

  const ownerLabel = (e) => e.owner==='academy' || !e.owner ? 'الأكاديمية (عام)' : (teachers.find(t=>t.id===e.owner)?.name || 'الأكاديمية (عام)');

  return (
    <div>
      <div className="topbar">
        <div><h1>الحسابات</h1><div className="date">مصروفات تشغيلية، نسب المدرسين، وصافي الربح — عرض الأدمن فقط</div></div>
      </div>

      <div className="chip-row" style={{marginBottom:16}}>
        <span className={"chip "+(view==='expenses'?'active':'')} onClick={()=>setView('expenses')}>مصروفات تشغيلية</span>
        <span className={"chip "+(view==='shares'?'active':'')} onClick={()=>setView('shares')}>نسب المدرسين وصافي الربح</span>
        <span className={"chip "+(view==='daily'?'active':'')} onClick={()=>setView('daily')}>تقرير يومي مفصل</span>
      </div>

      {view==='expenses' && (
        <div>
          <div className="toolbar">
            <input type="month" style={{maxWidth:170}} value={month} onChange={e=>setMonth(e.target.value)} />
            <button className="btn btn-primary" style={{marginRight:'auto'}} onClick={()=>setCreating({id:null,date:todayISO(),category:EXPENSE_CATEGORIES[0],description:'',amount:'',owner:'academy'})}>+ مصروف جديد</button>
          </div>
          <div className="card">
            <div className="section-title">مصروفات {monthLabel(month)} — إجمالي {fmtMoney(totalExpenses)}</div>
            {monthExpenses.length===0 ? <Empty icon="⎘" text="لا توجد مصروفات مسجلة هذا الشهر" /> : (
              <table>
                <thead><tr><th>التاريخ</th><th>البند</th><th>الوصف</th><th>خاص بـ</th><th>المبلغ</th><th></th></tr></thead>
                <tbody>
                  {monthExpenses.sort((a,b)=>b.date.localeCompare(a.date)).map(e=>(
                    <tr key={e.id}>
                      <td>{e.date}</td><td>{e.category}</td><td className="small muted">{e.description||'—'}</td>
                      <td><span className="badge badge-gray">{ownerLabel(e)}</span></td>
                      <td>{fmtMoney(e.amount)}</td>
                      <td><button className="btn btn-danger btn-sm" onClick={()=>removeExpense(e.id)}>حذف</button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
          </div>
        </div>
      )}

      {view==='shares' && (
        <div>
          <div className="toolbar"><input type="month" style={{maxWidth:170}} value={month} onChange={e=>setMonth(e.target.value)} /></div>
          <div className="grid grid-4" style={{marginBottom:18}}>
            <div className="card"><div className="stat-label">الإيرادات المحصّلة</div><div className="stat-value" style={{color:'var(--green)'}}>{fmtMoney(monthRevenue)}</div></div>
            <div className="card"><div className="stat-label">مصروفات مشتركة (عامة)</div><div className="stat-value" style={{color:'var(--rose)'}}>{fmtMoney(totalSharedExpenses)}</div></div>
            <div className="card"><div className="stat-label">نصيب المدرسين (نسبة)</div><div className="stat-value" style={{color:'var(--amber)'}}>{fmtMoney(totalShares)}</div></div>
            <div className="card"><div className="stat-label">صافي ربح الأكاديمية</div><div className="stat-value" style={{color:academyNetProfit>=0?'var(--green)':'var(--rose)'}}>{fmtMoney(academyNetProfit)}</div></div>
          </div>

          <div className="card" style={{marginBottom:18}}>
            <div className="section-title">مدرسين نظام النسبة — {monthLabel(month)}</div>
            <table>
              <thead><tr><th>المدرس</th><th>إيرادات مجموعاته</th><th>نسبته</th><th>نصيبه (يُصرف له)</th><th>نصيب الأكاديمية</th></tr></thead>
              <tbody>
                {teacherShares.map(t=>(
                  <tr key={t.teacher.id}>
                    <td>{t.teacher.name}</td><td>{fmtMoney(t.revenue)}</td><td>{t.pct}%</td>
                    <td style={{fontWeight:800}}>{fmtMoney(t.share)}</td>
                    <td className="small muted">{fmtMoney(t.academyCut)}</td>
                  </tr>
                ))}
                {teacherShares.length===0 && <tr><td colSpan="5" className="muted small" style={{textAlign:'center',padding:14}}>لا يوجد مدرسين على نظام النسبة</td></tr>}
              </tbody>
            </table>
          </div>

          {ownerBlock && (
            <div className="card">
              <div className="section-title">حساب {ownerBlock.teacher.name} (صاحب الأكاديمية — منفصل عن نظام النسبة)</div>
              <table>
                <thead><tr><th>إيرادات مجموعاته</th><th>إيرادات الدروس الخصوصية</th><th>مصروفاته الخاصة (مذكرات..)</th><th>صافي حسابه</th></tr></thead>
                <tbody>
                  <tr>
                    <td>{fmtMoney(ownerBlock.ownerGroupRevenue)}</td>
                    <td>{fmtMoney(ownerBlock.ownerPrivateRevenue)}</td>
                    <td className="small muted">−{fmtMoney(ownerBlock.ownerExpenses)}</td>
                    <td style={{fontWeight:900}}>{fmtMoney(ownerBlock.ownerNet)}</td>
                  </tr>
                </tbody>
              </table>
              <p className="small muted" style={{marginTop:10}}>صافي حسابه بيتجمع مع نصيب الأكاديمية من باقي المدرسين، وبعدين تتطرح منه المصروفات العامة المشتركة (الإيجار والفواتير) للوصول لصافي ربح الأكاديمية الكلي فوق.</p>
            </div>
          )}
        </div>
      )}

      {view==='daily' && (
        <div>
          <div className="toolbar"><input type="date" style={{maxWidth:180}} value={day} onChange={e=>setDay(e.target.value)} /></div>
          <div className="grid grid-3" style={{marginBottom:18}}>
            <div className="card"><div className="stat-label">حضور اليوم</div><div className="stat-value" style={{color:'var(--green)'}}>{dayPresent}</div></div>
            <div className="card"><div className="stat-label">غياب اليوم</div><div className="stat-value" style={{color:'var(--rose)'}}>{dayAbsent}</div></div>
            <div className="card"><div className="stat-label">محصّل اليوم</div><div className="stat-value">{fmtMoney(dayCollected)}</div></div>
          </div>
          <div className="card">
            <div className="section-title">مدفوعات {day}</div>
            {dayPayments.length===0 ? <Empty icon="৳" text="لا توجد مدفوعات مسجلة في هذا اليوم" /> : (
              <table>
                <thead><tr><th>الطالب</th><th>الشهر</th><th>المبلغ</th></tr></thead>
                <tbody>
                  {dayPayments.map(p=>{
                    const st = students.find(s=>s.id===p.studentId);
                    return <tr key={p.id}><td>{st?st.name:'—'}</td><td>{monthLabel(p.month)}</td><td>{fmtMoney(p.amount)}</td></tr>;
                  })}
                </tbody>
              </table>
            )}
          </div>
        </div>
      )}

      {creating && (
        <Modal title="مصروف جديد" onClose={()=>setCreating(null)}>
          <ExpenseForm expense={creating} categories={EXPENSE_CATEGORIES} teachers={teachers} onCancel={()=>setCreating(null)} onSave={saveExpense} />
        </Modal>
      )}
    </div>
  );
}

function ScanAttendanceTab({groups,students,attendance,persistAttendance,payments,groupById}){
  const [date,setDate] = useState(todayISO());
  const [cameraOn,setCameraOn] = useState(false);
  const [manualCode,setManualCode] = useState('');
  const [feedback,setFeedback] = useState(null); // {type, title, lines:[]}
  const videoRef = React.useRef(null);
  const scannerRef = React.useRef(null);
  const lastRef = React.useRef({code:null, time:0});
  const inputRef = React.useRef(null);

  useEffect(()=>{ inputRef.current && inputRef.current.focus(); },[]);

  useEffect(()=>{
    return ()=>{ if(scannerRef.current){ scannerRef.current.stop(); scannerRef.current.destroy(); scannerRef.current=null; } };
  },[]);

  const markPresent = (student) => {
    const g = groupById(student.groupId);
    if(!g){
      setFeedback({type:'rose', title:'الطالب غير مسجل في أي مجموعة', lines:[student.name]});
      return;
    }
    const existing = attendance.find(a=>a.groupId===g.id && a.date===date);
    const records = existing ? {...existing.records} : {};
    records[student.id] = 'present';
    const rec = {id: existing?existing.id:uid(), groupId:g.id, date, records};
    const others = attendance.filter(a=>!(a.groupId===g.id && a.date===date));
    persistAttendance([...others, rec]);

    const mk = monthKey();
    const paid = payments.some(p=>p.studentId===student.id && p.month===mk && p.paid);
    setFeedback({
      type: paid ? 'green' : 'amber',
      title: 'تم تسجيل الحضور ✓',
      lines: [student.name, g.name, paid ? 'المصروفات: مسدّدة ✓' : 'تنبيه: المصروفات متأخرة هذا الشهر']
    });
  };

  const handleCode = (raw) => {
    const now = Date.now();
    if(lastRef.current.code===raw && now-lastRef.current.time<2500) return;
    lastRef.current = {code:raw, time:now};
    const id = parseQrPayload(raw);
    const student = students.find(s=>s.id===id || s.id===raw);
    if(!student){
      setFeedback({type:'rose', title:'كود غير معروف', lines:[raw]});
      return;
    }
    markPresent(student);
  };

  const startCamera = async () => {
    if(!window.QrScanner){ alert('تعذّر تحميل مكتبة الكاميرا، تأكد من الاتصال بالإنترنت'); return; }
    try{
      QrScanner.WORKER_PATH = 'https://cdnjs.cloudflare.com/ajax/libs/qr-scanner/1.4.2/qr-scanner-worker.min.js';
      scannerRef.current = new QrScanner(videoRef.current, (result)=>handleCode(result.data||result), {highlightScanRegion:true, highlightCodeOutline:true});
      await scannerRef.current.start();
      setCameraOn(true);
    }catch(err){
      alert('تعذّر تشغيل الكاميرا: '+err.message);
    }
  };
  const stopCamera = () => {
    if(scannerRef.current){ scannerRef.current.stop(); }
    setCameraOn(false);
  };

  const onManualSubmit = (e) => {
    e.preventDefault();
    if(!manualCode.trim()) return;
    handleCode(manualCode.trim());
    setManualCode('');
    inputRef.current && inputRef.current.focus();
  };

  return (
    <div>
      <div className="topbar">
        <div><h1>تسجيل حضور بالكود</h1><div className="date">امسح كود الطالب بالكاميرا أو بجهاز قارئ الباركود</div></div>
      </div>

      <div className="toolbar">
        <input type="date" style={{maxWidth:180}} value={date} onChange={e=>setDate(e.target.value)} />
      </div>

      <div className="grid grid-2">
        <div className="card">
          <div className="section-title">قارئ باركود / كيبورد (الأسرع)</div>
          <p className="small muted">لو عندك جهاز قارئ QR أو باركود متصل بالكمبيوتر، دوس جوه المربع تحت وابدأ المسح — الجهاز بيكتب الكود تلقائيًا.</p>
          <form onSubmit={onManualSubmit}>
