}

const FACE_MODELS_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights';

function FaceAttendanceTab({groups,students,persistStudents,attendance,persistAttendance,payments,groupById}){
  const [modelsState,setModelsState] = useState('loading'); // loading | ready | error
  const [mode,setMode] = useState('scan'); // scan | enroll
  const [date,setDate] = useState(todayISO());
  const [enrollStudentId,setEnrollStudentId] = useState(students[0]?students[0].id:'');
  const [cameraOn,setCameraOn] = useState(false);
  const [feedback,setFeedback] = useState(null);
  const [enrollMsg,setEnrollMsg] = useState('');
  const videoRef = React.useRef(null);
  const canvasRef = React.useRef(null);
  const streamRef = React.useRef(null);
  const intervalRef = React.useRef(null);
  const lastRef = React.useRef({}); // studentId -> last-marked timestamp, to avoid re-marking every second

  useEffect(()=>{
    (async()=>{
      try{
        await Promise.all([
          faceapi.nets.tinyFaceDetector.loadFromUri(FACE_MODELS_URL),
          faceapi.nets.faceLandmark68Net.loadFromUri(FACE_MODELS_URL),
          faceapi.nets.faceRecognitionNet.loadFromUri(FACE_MODELS_URL),
        ]);
        setModelsState('ready');
      }catch(err){
        console.error(err);
        setModelsState('error');
      }
    })();
    return ()=>stopCamera();
  },[]);

  const enrolledStudents = useMemo(()=> students.filter(s=>s.faceDescriptor && s.faceDescriptor.length===128), [students]);

  const matcher = useMemo(()=>{
    if(enrolledStudents.length===0) return null;
    const labeled = enrolledStudents.map(s=> new faceapi.LabeledFaceDescriptors(s.id, [new Float32Array(s.faceDescriptor)]));
    return new faceapi.FaceMatcher(labeled, 0.5);
  }, [enrolledStudents]);

  const startCamera = async () => {
    try{
      const stream = await navigator.mediaDevices.getUserMedia({video:{width:480,height:360}});
      streamRef.current = stream;
      videoRef.current.srcObject = stream;
      await videoRef.current.play();
      setCameraOn(true);
    }catch(err){
      alert('تعذّر تشغيل الكاميرا: '+err.message);
    }
  };
  const stopCamera = () => {
    if(intervalRef.current){ clearInterval(intervalRef.current); intervalRef.current=null; }
    if(streamRef.current){ streamRef.current.getTracks().forEach(t=>t.stop()); streamRef.current=null; }
    setCameraOn(false);
  };

  // ---- Enrollment ----
  const captureFace = async () => {
    setEnrollMsg('جارِ التقاط الوجه...');
    const det = await faceapi.detectSingleFace(videoRef.current, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
    if(!det){ setEnrollMsg('لم يتم العثور على وجه واضح، حاول تاني بإضاءة أفضل'); return; }
    const descriptor = Array.from(det.descriptor);
    persistStudents(students.map(s=> s.id===enrollStudentId ? {...s, faceDescriptor:descriptor} : s));
    const st = students.find(s=>s.id===enrollStudentId);
    setEnrollMsg('تم تسجيل وجه '+(st?st.name:'')+' بنجاح ✓');
  };

  // ---- Live recognition ----
  const markPresent = (student) => {
    const g = groupById(student.groupId);
    if(!g) return;
    const existing = attendance.find(a=>a.groupId===g.id && a.date===date);
    const records = existing ? {...existing.records} : {};
    records[student.id] = 'present';
    const rec = {id: existing?existing.id:uid(), groupId:g.id, date, records};
    const others = attendance.filter(a=>!(a.groupId===g.id && a.date===date));
    persistAttendance([...others, rec]);
    const mk = monthKey();
    const paid = payments.some(p=>p.studentId===student.id && p.month===mk && p.paid);
    setFeedback({type: paid?'green':'amber', title:'تم تسجيل الحضور بالوجه ✓', lines:[student.name, g.name, paid?'المصروفات: مسدّدة ✓':'تنبيه: المصروفات متأخرة هذا الشهر']});
  };

  const startScanning = async () => {
    await startCamera();
    intervalRef.current = setInterval(async ()=>{
      if(!videoRef.current || videoRef.current.readyState!==4) return;
      const detections = await faceapi.detectAllFaces(videoRef.current, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptors();
      const canvas = canvasRef.current;
      if(canvas){
        const ctx = canvas.getContext('2d');
        canvas.width = videoRef.current.videoWidth; canvas.height = videoRef.current.videoHeight;
        ctx.clearRect(0,0,canvas.width,canvas.height);
        detections.forEach(d=>{
          const box = d.detection.box;
          let label = 'غير معروف';
          let color = '#d1332f';
          if(matcher){
            const match = matcher.findBestMatch(d.descriptor);
            if(match.label!=='unknown'){
              const st = students.find(s=>s.id===match.label);
              if(st){ label = st.name; color = '#1a8a4a';
                const now = Date.now();
                if(!lastRef.current[st.id] || now-lastRef.current[st.id]>8000){
                  lastRef.current[st.id] = now;
                  markPresent(st);
                }
              }
            }
          }
          ctx.strokeStyle = color; ctx.lineWidth = 2;
          ctx.strokeRect(box.x, box.y, box.width, box.height);
          ctx.fillStyle = color;
          ctx.font = '14px Tajawal, sans-serif';
          ctx.fillText(label, box.x, box.y>16?box.y-6:box.y+box.height+16);
        });
      }
    }, 1000);
  };

  return (
    <div>
      <div className="topbar">
        <div><h1>التعرف على الوجه</h1><div className="date">سجّل وجوه الطلاب مرة واحدة، وبعدها الكاميرا تسجل حضورهم أوتوماتيك</div></div>
      </div>

      {modelsState==='loading' && <div className="card"><Empty icon="◎" text="جارِ تحميل نموذج التعرف على الوجه..." /></div>}
      {modelsState==='error' && (
        <div className="card">
          <Empty icon="⚠" text="تعذّر تحميل نموذج التعرف على الوجه" />
          <p className="small muted" style={{textAlign:'center'}}>هذه الميزة تحتاج اتصال بالإنترنت، ولا تعمل داخل معاينة Claude — جرّبها بعد رفع الملف على GitHub Pages.</p>
        </div>
      )}

      {modelsState==='ready' && (
        <React.Fragment>
          <div className="chip-row" style={{marginBottom:16}}>
            <span className={"chip "+(mode==='scan'?'active':'')} onClick={()=>{stopCamera(); setMode('scan'); setFeedback(null);}}>مسح الحضور</span>
            <span className={"chip "+(mode==='enroll'?'active':'')} onClick={()=>{stopCamera(); setMode('enroll'); setEnrollMsg('');}}>تسجيل وجوه الطلاب</span>
          </div>

          {mode==='enroll' ? (
            <div className="card">
              <div className="section-title">تسجيل وجه طالب</div>
              <div className="grid grid-2" style={{marginBottom:14}}>
                <Field label="اختر الطالب">
                  <select value={enrollStudentId} onChange={e=>setEnrollStudentId(e.target.value)}>
                    {students.map(s=>(
                      <option key={s.id} value={s.id}>{s.name}{s.faceDescriptor?' — مسجل ✓':''}</option>
                    ))}
                  </select>
                </Field>
              </div>
              {!cameraOn ? (
                <button className="btn btn-primary" onClick={startCamera}>📷 تشغيل الكاميرا</button>
              ) : (
                <div style={{display:'flex',gap:10}}>
                  <button className="btn btn-primary" onClick={captureFace}>📸 التقاط وتسجيل الوجه</button>
                  <button className="btn btn-ghost" onClick={stopCamera}>إيقاف الكاميرا</button>
                </div>
              )}
              <video ref={videoRef} style={{width:340,borderRadius:10,marginTop:14,display:cameraOn?'block':'none'}} muted playsInline></video>
              {enrollMsg && <div className="small" style={{marginTop:10,fontWeight:800}}>{enrollMsg}</div>}
              <div className="small muted" style={{marginTop:14}}>{enrolledStudents.length} من {students.length} طالب مسجل وجههم حتى الآن</div>
            </div>
          ) : (
            <div>
              <div className="toolbar">
                <input type="date" style={{maxWidth:180}} value={date} onChange={e=>setDate(e.target.value)} />
                {!cameraOn ? (
                  <button className="btn btn-primary" onClick={startScanning} disabled={!matcher}>📷 تشغيل الكاميرا والمسح</button>
                ) : (
                  <button className="btn btn-ghost" onClick={stopCamera}>إيقاف الكاميرا</button>
                )}
              </div>
              {!matcher && <div className="card"><Empty icon="◎" text="لازم تسجّل وجوه الطلاب الأول من تبويب (تسجيل وجوه الطلاب)" /></div>}
              <div className="card" style={{position:'relative',width:'fit-content'}}>
                <video ref={videoRef} style={{width:480,borderRadius:10,display:cameraOn?'block':'none'}} muted playsInline></video>
                <canvas ref={canvasRef} style={{position:'absolute',top:18,left:18,display:cameraOn?'block':'none'}}></canvas>
                {!cameraOn && <Empty icon="📷" text="شغّل الكاميرا لبدء المسح" />}
              </div>
              {feedback && (
                <div className="card" style={{marginTop:16, borderColor: feedback.type==='green'?'var(--green)':'var(--amber)'}}>
                  <div style={{fontWeight:900, fontSize:16, color: feedback.type==='green'?'var(--green)':'var(--amber)'}}>{feedback.title}</div>
                  {feedback.lines.map((l,i)=><div key={i} style={{marginTop:4}}>{l}</div>)}
                </div>
              )}
            </div>
          )}
        </React.Fragment>
      )}
    </div>
  );
}

function LevelDiagram({rate, examsAvg}){
  const bars = [
    {label:'نسبة الحضور', value: rate===null?0:rate, hasData: rate!==null, color:'#1a8a4a'},
    {label:'متوسط الدرجات', value: examsAvg===null?0:examsAvg, hasData: examsAvg!==null, color:'#FF0000'},
  ];
  const W = 460, barH = 26, gap = 22, leftPad = 130, topPad = 10;
  const chartW = W - leftPad - 20;
  const H = topPad*2 + bars.length*(barH+gap);
  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} xmlns="http://www.w3.org/2000/svg" style={{maxWidth:W}}>
      {bars.map((b,i)=>{
        const y = topPad + i*(barH+gap);
        const w = b.hasData ? (b.value/100)*chartW : 0;
        return (
          <g key={i}>
            <text x={leftPad-10} y={y+barH*0.7} textAnchor="end" fontSize="13" fontFamily="Tajawal, sans-serif" fill="#221e1c" fontWeight="700">{b.label}</text>
            <rect x={leftPad} y={y} width={chartW} height={barH} rx="8" fill="#f0ebe4" />
            <rect x={leftPad} y={y} width={w} height={barH} rx="8" fill={b.color} />
            <text x={leftPad+chartW+8} y={y+barH*0.7} fontSize="13" fontFamily="Tajawal, sans-serif" fill="#221e1c" fontWeight="900">{b.hasData? b.value+'%' : '—'}</text>
          </g>
        );
      })}
    </svg>
  );
}
